publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-139.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
